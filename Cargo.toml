[workspace]
members = [
  "crates/mvm-builder",
  "crates/mvm-cli",
  "crates/mvm-core",
  "crates/mvm-backend",
  "crates/mvm-providers",
]
resolver = "3"

[workspace.package]
version = "0.13.0"
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
repository = "https://github.com/auser/mvm"
homepage = "https://github.com/auser/mvm"
authors = ["mvm contributors"]
build = "build.rs"

[workspace.dependencies]
mvm-builder = { path = "crates/mvm-builder" }
mvm-core = { path = "crates/mvm-core" }
mvm-backend = { path = "crates/mvm-backend" }
mvm-cli = { path = "crates/mvm-cli" }
mvm-providers = { path = "crates/mvm-providers" }


anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["env", "derive"] }
lazy_static = "1.5.0"
nix = "0.31.2"
serde = { version = "1.0.228", features = ["derive"] }
shadow-rs = { version = "2.0.0", features = ["metadata"] }
tempfile = "3.27.0"
thiserror = "2.0.18"
tokio = { version = "1.42", features = ["full"] }
tokio-util = { version = "0.7", features = ["io"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
microsandbox = "0.4.5"
libc = "0.2.186"
rand = "0.10.1"
async-trait = "0.1.89"


# Package
[package]
name = "mvmctl"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Firecracker microVM development tool"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[lib]
name = "mvmctl"
path = "src/lib.rs"

# We'll see if we want to keep this
[[bin]]
name = "mvmctl"
path = "src/main.rs"

[[bin]]
name = "mvm-builder"
path = "crates/mvm-builder/bin/main.rs"

[dependencies]
anyhow = { workspace = true }
mvm-core.workspace = true
mvm-builder.workspace = true

# [target.'cfg(target_os = "macos")'.dependencies]
# keyring = { version = "3.6.3", features = ["apple-native"], optional = true }

# [target.'cfg(target_os = "windows")'.dependencies]
