[package]
name = "mvm-runtime"
version = "0.1.0"
edition = "2024"
build = "build.rs"


[lib]
path = "src/lib.rs"

[[bin]]
name = "mvm-runtime"
path = "bin/main.rs"

[dependencies]
anyhow = "1.0.102"
clap = { version = "4.6.1", features = ["env", "derive"] }
lazy_static = "1.5.0"
serde = { version = "1.0.228", features = ["derive"] }
shadow-rs = { version = "2.0.0", features = ["metadata"] }
tempfile = "3.27.0"
thiserror = "2.0.18"

tokio = { version = "1.42", features = ["full"] }
tokio-util = { version = "0.7", features = ["io"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[target.'cfg(target_os = "macos")'.dependencies]
keyring = { version = "3.6.3", features = ["apple-native"], optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
keyring = { version = "3.6.3", features = ["windows-native"], optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
# Transitive dep via keyring's Secret Service backend; declared here only to force the `vendored` feature
# so libdbus is built from source and statically linked (avoids needing libdbus-1-dev at build time).
dbus = { version = "0.9.10", features = ["vendored"], optional = true }
keyring = { version = "3.6.3", features = [
    "crypto-rust",
    "linux-native-sync-persistent",
], optional = true }


[build-dependencies]
shadow-rs = { version = "2.0.0", features = ["no_std"] }
# shadow-rs = { version = "{latest version}", features = ["no_std"] }
