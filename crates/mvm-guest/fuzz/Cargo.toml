[package]
name = "mvm-guest-fuzz"
version = "0.0.0"
publish = false
edition = "2024"

# Detach this Cargo.toml from the parent workspace. The root
# `Cargo.toml` lists `crates/mvm-guest/fuzz` in `workspace.exclude`,
# but recent cargo versions also require the excluded sub-package to
# self-identify as standalone (otherwise `cargo build --manifest-path
# crates/mvm-guest/fuzz/Cargo.toml` errors with "current package
# believes it's in a workspace when it's not"). An empty `[workspace]`
# table is the documented fix.
[workspace]

# cargo-fuzz looks for this metadata key; without it the harness refuses
# to drive the binaries.
[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
serde_json = "1"
ed25519-dalek = "2"

[dependencies.mvm-guest]
path = ".."

[dependencies.mvm-core]
path = "../../mvm-core"

# Plan 89 W2 — `fuzz_builder_request` covers the
# `BuilderRequest`/`BuilderResponse` payloads in
# `mvm-build::builder_protocol`. mvm-build depends on mvm-guest, so
# this is fine direction-wise; the fuzz crate is already detached
# from the workspace (see [workspace] above).
[dependencies.mvm-build]
path = "../../mvm-build"

# Forbid building these as bench/test/doc; they are libfuzzer harnesses
# only, driven by `cargo fuzz run <name>`.
[[bin]]
name = "fuzz_guest_request"
path = "fuzz_targets/fuzz_guest_request.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_authenticated_frame"
path = "fuzz_targets/fuzz_authenticated_frame.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_entrypoint_event"
path = "fuzz_targets/fuzz_entrypoint_event.rs"
test = false
doc = false
bench = false

[[bin]]
name = "fuzz_authed_path"
path = "fuzz_targets/fuzz_authed_path.rs"
test = false
doc = false
bench = false

# Plan 89 W2 — persistent builder VM dispatch wire.
[[bin]]
name = "fuzz_builder_request"
path = "fuzz_targets/fuzz_builder_request.rs"
test = false
doc = false
bench = false
