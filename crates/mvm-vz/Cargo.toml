[package]
name = "mvm-vz"
version.workspace = true
edition.workspace = true
description = "Type-safe interface to the `mvm-vz-supervisor` Swift binary: builds the SupervisorConfig JSON it consumes and resolves its on-disk path"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

# ── What this crate is ─────────────────────────────────────────────
#
# Plan 97 Phase B foundation. Parallel to `mvm-libkrun/` but much
# thinner — Vz lives in a Swift binary (`crates/mvm-vz-supervisor/`),
# so the Rust side does not link any C library. This crate exposes:
#
# - `SupervisorConfig` (+ nested types) — serde-derived structs whose
#   JSON shape exactly matches the Swift `Config.swift` decoder.
#   `#[serde(deny_unknown_fields)]` on every type matches the
#   Swift-side `StrictKeys` contract; ADR-002 claim 5's "Rust and
#   Swift reject the same inputs" equivalence test rides on this.
# - `supervisor_binary_path` — version-pinned `~/.mvm/bin/` path the
#   release-distribution layout uses, plus a `source_tree_binary_path`
#   helper for source-checkout builds.
# - `Error` — narrow error surface for config validation problems
#   the host can detect before spawning the supervisor.
#
# Tier-2 backend implementations (the actual `VzBackend` in
# `mvm-backend/src/vz.rs`) layer on top of this crate. Same separation
# as `mvm-libkrun` → `mvm-backend::LibkrunBackend`.

[dependencies]
# `SupervisorConfig` serializes to JSON the supervisor binary reads
# on stdin. `deny_unknown_fields` mirrors the Swift decoder's
# `StrictKeys` protocol.
serde = { workspace = true }
serde_json = { workspace = true }

[dev-dependencies]
# Round-trip tests assert the JSON shape matches the Swift schema
# byte-for-byte where it matters (sorted-key serialization +
# deny-unknown-fields rejection).
serde_json = { workspace = true }

[lints]
workspace = true
