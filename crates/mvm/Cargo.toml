[package]
name = "mvm"
version.workspace = true
edition.workspace = true
description = "Shell execution and VM lifecycle for mvm"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
autobins = false

[dependencies]
mvm-core.workspace = true
mvm-plan.workspace = true
mvm-security.workspace = true
mvm-guest.workspace = true
mvm-build = { workspace = true, default-features = false }
mvm-backend = { workspace = true, default-features = false }
mvm-base.workspace = true
anyhow.workspace = true
# Plan 60 Phase 7a — `OverlayManager` is an async trait carrying
# chrono timestamps + thiserror'd typed errors.
async-trait = "0.1"
thiserror = "1"
base64.workspace = true
chrono.workspace = true
colored.workspace = true
ed25519-dalek.workspace = true
rand.workspace = true
secrecy.workspace = true
indicatif.workspace = true
inquire.workspace = true
opendal = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tempfile.workspace = true
toml.workspace = true
tracing.workspace = true
tokio.workspace = true
mvm-providers.workspace = true
libc.workspace = true

[features]
default = []
contributor-bootstrap = [
    "mvm-build/contributor-bootstrap",
    "mvm-backend/contributor-bootstrap",
]
manifest-verify = ["mvm-security/manifest-verify"]
template-registry-s3 = ["dep:opendal"]

[lints]
workspace = true
