[package]
name = "mvm-sdk"
description = "Build-time Rust SDK for mvm — declare workloads, emit canonical IR, manage addons. Ported from mvmforge-sdk + mvmforge-addon (SDK port plan)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]
mvm-ir = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = "1"

# Phase 7 — runtime record mode encodes `Sandbox.files.write` bytes
# as base64 in the recording JSON so the lowering can re-emit them
# as a `before_start` shell hook.
base64 = { workspace = true }

# Addon module deps (SDK port Phase 1b).
flate2 = { workspace = true }
hex = { workspace = true }
hmac = { workspace = true }
schemars = "0.8"
sha2 = { workspace = true }
tar = { workspace = true }
toml = { workspace = true }
tree-sitter = { workspace = true }
tree-sitter-nix = { workspace = true }

# Compile pipeline deps (SDK port Phase 2a + 2b).
globset = { workspace = true }
tempfile = { workspace = true }
tree-sitter-python = { workspace = true }
tree-sitter-javascript = { workspace = true }
tree-sitter-typescript = { workspace = true }

[[bin]]
name = "emit_addon_schema"
path = "src/bin/emit_addon_schema.rs"

[lints]
workspace = true
