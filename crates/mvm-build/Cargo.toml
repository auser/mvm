[package]
name = "mvm-build"
version.workspace = true
edition.workspace = true
description = "Nix builder pipeline and artifact cache for mvm"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[dependencies]
mvm-core.workspace = true
mvm-guest.workspace = true
anyhow.workspace = true
chrono.workspace = true
# Optional — see the same dep in `mvm-backend/Cargo.toml` for the
# sqlite-link-conflict rationale. `MicrosandboxBuilderVm` and its async
# runner are the only consumers in this crate; both gate behind
# `backends-microsandbox`. The non-microsandbox helpers (`ArtifactSidecar`,
# `emit_sidecar_via_passthru_query`, builder-dir constants) stay
# unconditional so `mvm-base` and `pipeline::dev_build` keep compiling
# either way.
microsandbox = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tera.workspace = true
thiserror = "1"
tokio.workspace = true
toml.workspace = true
tracing.workspace = true
which = "6"

[dev-dependencies]
tempfile.workspace = true

[features]
# `backends-microsandbox` is default-on so `cargo {build,test} -p mvm-build`
# exercises `MicrosandboxBuilderVm`. The mvmctl facade, mvm-cli, and the mvm
# crate all declare `default-features = false` on their mvm-build dep and
# re-forward the feature, so library consumers (e.g. mvmd) can disable the
# whole chain via `mvmctl { default-features = false }`.
default = ["backends-microsandbox"]
backends-microsandbox = ["dep:microsandbox"]

[lints]
workspace = true
