[package]
name = "mvm-build"
version.workspace = true
edition.workspace = true
description = "Nix builder pipeline and artifact cache for mvm"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[dependencies]
mvm-core.workspace = true
mvm-guest.workspace = true
anyhow.workspace = true
chrono.workspace = true
# Optional — see the same dep in `mvm-backend/Cargo.toml` for the
# sqlite-link-conflict rationale. `MicrosandboxBuilderVm` and its async
# runner are the only consumers in this crate; both gate behind
# `contributor-bootstrap`. The non-microsandbox helpers (`ArtifactSidecar`,
# `emit_sidecar_via_passthru_query`, builder-dir constants) stay
# unconditional so `mvm-base` and `pipeline::dev_build` keep compiling
# either way.
microsandbox = { workspace = true, optional = true }
# Plan 72 W1: optional libkrun FFI dep for the in-tree builder VM
# launcher (`libkrun_builder::LibkrunBuilderVm`). Gated by
# `backends-builder-vm-libkrun`; default-off until Plan 72 W5
# cutover flips polarity. Independent of `contributor-bootstrap`
# (microsandbox); both can coexist during the W5 transition.
mvm-libkrun = { workspace = true, optional = true }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
thiserror = "1"
tokio.workspace = true
toml.workspace = true
tracing.workspace = true
which = "6"

[dev-dependencies]
tempfile.workspace = true

[features]
# Heavy microsandbox support is opt-in for lean default builds.
default = []
contributor-bootstrap = ["dep:microsandbox"]
# Plan 72 W1: libkrun-direct builder VM launcher (default-off
# scaffolding through W4; default-on after W5 cutover). Pulls
# the `mvm-libkrun` FFI crate which itself gates the underlying
# `libkrun-sys` bindings.
backends-builder-vm-libkrun = ["dep:mvm-libkrun"]

[lints]
workspace = true
