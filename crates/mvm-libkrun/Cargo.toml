[package]
name = "mvm-libkrun"
version.workspace = true
edition.workspace = true
description = "Rust bindings for the Red Hat libkrun C library (Linux KVM, macOS HVF)"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true
build = "build.rs"

# ‚îÄ‚îÄ What this crate is ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#
# Thin Rust bindings + a safe wrapper around Red Hat libkrun's C API.
# libkrun is a library-style VMM: linked directly into the calling
# binary, no out-of-process daemon. On Linux it uses KVM; on macOS it
# uses Hypervisor.framework. mvm uses it as a Tier 2 microVM backend
# and (post-Plan-71) the builder-VM substrate.
#
# Two build modes:
#
#   * default (no feature) ‚Äî no FFI, no link to libkrun. `start`/`stop`
#     return `Error::NotYetWired`. The workspace builds cleanly on hosts
#     without libkrun installed.
#
#   * `libkrun-sys` ‚Äî bindgen-generated FFI + `-lkrun` link. Requires
#     libkrun.h on the host (probed by build.rs at the standard install
#     locations) and a working libkrun shared library at link time.
#
# Plan 57 W1 lands the bindings; W2 adds macOS codesigning entitlements;
# W3 validates an end-to-end boot. This crate stays narrowly focused on
# the FFI surface ‚Äî backend dispatch lives in mvm-backend.

[dependencies]
libc.workspace = true
tracing = "0.1"
# `serde` is always on (with `derive`) so the `KrunContext`,
# `KrunDisk`, and `SupervisorConfig` types are serializable from
# any consumer ‚Äî notably `mvm-backend::LibkrunBackend`, which
# builds the supervisor's JSON without ever enabling `libkrun-sys`
# itself. Compile cost is marginal; serde is already in nearly
# every other workspace crate's dep graph.
serde = { workspace = true }
# We intentionally do NOT pull `mvm-guest` from regular deps: that
# would close a cycle (mvm-core ‚Üí mvm-libkrun ‚Üí mvm-guest ‚Üí mvm-core,
# since mvm-core depends on mvm-libkrun for `Platform::has_libkrun`).
# The supervisor receives the vsock port list via the JSON config ‚Äî
# the symbolic `GUEST_AGENT_PORT` constant is only needed by callers
# composing the config, not by the supervisor consuming it. The
# `libkrun-smoke` example keeps `mvm-guest` as a dev-dep because
# dev-deps are excluded from cycle analysis.
#
# Plan 102 W6.A.5 moved the `mvm-libkrun-supervisor` bin out into
# its own leaf crate (`crates/mvm-libkrun-supervisor/`) so the bin
# can also depend on `mvm-supervisor` for the gateway audit
# substrate. The optional `mvm-providers` + `serde_json` deps that
# previously gated the bin moved with it. `serde_json` is still
# needed in `[dev-dependencies]` for the `SupervisorConfig` /
# `KrunContext` serde-roundtrip tests.
# Plan 87 W2 ‚Äî `passt` module probes $PATH for the `passt` binary
# before spawning it. `which` is already in the workspace dep tree
# (mvm-cli/mvm-build); pulling it in here keeps the dep graph
# uniform and avoids reinventing PATH search.
which.workspace = true

[build-dependencies]
# `bindgen` is required only when the `libkrun-sys` feature is on; we
# still list it unconditionally so the crate manifest reflects the real
# build-time graph. The build script returns early when the feature is
# off, so libclang isn't invoked in the default workspace build.
bindgen = "0.72"

[features]
default = []
# Opt-in: generate FFI bindings and link `libkrun`. Off by default so
# the workspace builds on hosts without libkrun installed (CI fast lane,
# Linux contributors who don't run the Tier 2 backend). With the
# supervisor bin moved to `mvm-libkrun-supervisor` (Plan 102 W6.A.5),
# this feature only gates the FFI surface in lib.rs (`configure_*`,
# `run_supervisor`, etc.); the bin pulls its own dep chain.
libkrun-sys = []

[dev-dependencies]
# Plan 87 W2 ‚Äî passt supervisor tests stage scratch dirs.
tempfile.workspace = true
# The plan 57 W3 smoke example shares `GUEST_AGENT_PORT` with the
# production vsock plumbing.
mvm-guest.workspace = true
# `ensure_signed()` is plan 57 W2's codesigning gate. macOS rejects
# any process that calls `Hypervisor.framework` without
# `com.apple.security.hypervisor`; the smoke binary self-signs on
# first run and re-spawns, same as `mvmctl up --hypervisor
# apple-container` does.
mvm-providers.workspace = true
# Plan 72 W4 prerequisite: unit tests for `KrunContext`'s serde
# shape (incl. the new `virtio_fs_mounts` field with `#[serde(default)]`
# back-compat) exercise the JSON pipe shape the supervisor binary
# carries. serde_json is already an optional regular dep behind
# `libkrun-sys`; listing it again as a dev-dep makes the test build
# independent of feature flags.
serde_json = { workspace = true }

# Plan 57 W3 ‚Äî manual smoke binary that boots a Nix-built kernel +
# ext4 rootfs via libkrun and blocks until the guest exits. Gated on
# `libkrun-sys` so the example only compiles on hosts with libkrun.h
# present.
[[example]]
name = "libkrun-smoke"
path = "examples/libkrun-smoke.rs"
required-features = ["libkrun-sys"]

# Plan 57 W4 ‚Äî long-running supervisor process. One process per
# libkrun guest. The bin moved to its own leaf crate
# (`crates/mvm-libkrun-supervisor/`) under Plan 102 W6.A.5 so it can
# depend on `mvm-supervisor` (gateway audit substrate) without
# closing the `mvm-supervisor ‚Üí mvm-backend ‚Üí mvm-libkrun` cycle.

[lints]
workspace = true
