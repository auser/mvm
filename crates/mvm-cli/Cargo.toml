[package]
name = "mvm-cli"
version.workspace = true
edition.workspace = true
description = "CLI commands, UI, and bootstrap for mvm"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[dependencies]
mvm-core.workspace = true
mvm-guest.workspace = true
# `default-features = false` + the feature-forwarding block carries the
# `backends-microsandbox` choice down to the leaf crates that actually
# pull microsandbox. See the same pattern in `crates/mvm/Cargo.toml` and
# the root `Cargo.toml`.
mvm = { workspace = true, default-features = false }
mvm-build = { workspace = true, default-features = false }
mvm-security.workspace = true
mvm-providers.workspace = true
mvm-libkrun.workspace = true
mvm-backend = { workspace = true, default-features = false }
mvm-mcp.workspace = true
mvm-plan.workspace = true
mvm-policy.workspace = true
mvm-supervisor.workspace = true
anyhow.workspace = true
# Plan 60 Phase 7a Slice D â€” `mvmctl audit verify-cert` decodes
# base64 destruction-cert signatures + pubkeys.
base64.workspace = true
chrono.workspace = true
ed25519-dalek.workspace = true
names.workspace = true
rand.workspace = true
secrecy.workspace = true
uuid.workspace = true
clap.workspace = true
reqwest.workspace = true
clap_complete.workspace = true
colored.workspace = true
ctrlc.workspace = true
libc.workspace = true
indicatif.workspace = true
inquire.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
tar = "0.4"
tempfile.workspace = true
toml.workspace = true
notify = { workspace = true, optional = true }
notify-debouncer-mini = { workspace = true, optional = true }
tokio = { workspace = true, features = ["rt"] }
tracing.workspace = true
tracing-subscriber.workspace = true
which.workspace = true

[dev-dependencies]
assert_cmd.workspace = true
ed25519-dalek.workspace = true
predicates.workspace = true
rand.workspace = true

[features]
default = []
backends-microsandbox = [
    "mvm/backends-microsandbox",
    "mvm-build/backends-microsandbox",
    "mvm-backend/backends-microsandbox",
]
# Plan 72 W1 / W5 scaffolding â€” forwards mvm-build's libkrun-builder
# feature so `mvm_cli::builder_vm_image::ensure_builder_vm_image` is
# compiled in. Plan 72 W5 flips this to `default` once the libkrun
# boot lifecycle (plan 57 W3) ships.
backends-builder-vm-libkrun = ["mvm-build/backends-builder-vm-libkrun"]
# Plan 72 W5 Stage 0 â€” microsandbox-backed bootstrap for building the
# in-repo `nix/images/builder-vm/flake.nix` on a contributor laptop
# without host Nix. Pulls in `backends-microsandbox` for the
# `MicrosandboxBuilderVm` impl. Plan 72 W5's cutover deletes the
# end-user-facing microsandbox path and renames `backends-microsandbox`
# â†’ `contributor-bootstrap` for clarity; the forward here is the
# bridge until that consolidation lands.
contributor-bootstrap = [
    "backends-microsandbox",
    "backends-builder-vm-libkrun",
]
custom-dns = ["mvm-supervisor/custom-dns"]
dev-watch = ["dep:notify", "dep:notify-debouncer-mini"]
manifest-verify = [
    "mvm/manifest-verify",
    "mvm-security/manifest-verify",
]
template-registry-s3 = ["mvm/template-registry-s3"]

[lints]
workspace = true
