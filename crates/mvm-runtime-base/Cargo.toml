[package]
name = "mvm-runtime-base"
version.workspace = true
edition.workspace = true
description = "Shared substrate for mvm-runtime + mvm-backend (UI, per-VM runtime metadata)"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

# ── What this crate owns ───────────────────────────────────────────
#
# The leaf substrate that both `mvm-runtime` and `mvm-backend` need.
# Plan-60 W7 lifted these modules out of `mvm-runtime` so concrete
# `VmBackend` implementations can sit in `mvm-backend` without a
# back-edge into `mvm-runtime`.
#
# Currently:
#   - `ui`            — `[mvm]` printing + spinners + interactive prompts
#   - `runtime_meta`  — per-VM `~/.mvm/vms/<name>/mode.json` (StartMode +
#                       accessible flag from W6.2 console gate)
#
# What does *not* live here yet (W8 target):
#   - `config` / `shell` / `linux_env` — Lima-coupled; the Firecracker
#     direct-launch rewrite unwinds these.
#   - `vm::microvm` / `vm::image` — depend on the Lima substrate above.
#   - The `vm::firecracker` Lima-era helpers.

[dependencies]
mvm-core.workspace = true
mvm-build.workspace = true

anyhow.workspace = true
colored.workspace = true
indicatif.workspace = true
inquire.workspace = true
libc.workspace = true
serde.workspace = true
serde_json.workspace = true
tracing.workspace = true

[dev-dependencies]
tempfile.workspace = true
