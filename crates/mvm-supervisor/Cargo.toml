[package]
name = "mvm-supervisor"
description = "Trusted host-side supervisor: owns egress proxy, tool gate, key release, audit signing, artifact capture, plan execution state machine. Plan 37 §7B."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

[dependencies]
mvm-core.workspace = true
mvm-plan.workspace = true
mvm-policy.workspace = true
# `mvm` provides the `VmNameRegistry` the TTL reaper walks.
# Heavy dep, but the supervisor's eventual job is to drive runtime
# operations anyway, so we'd be importing it shortly regardless.
mvm.workspace = true
anyhow.workspace = true
async-trait = "0.1"
base64.workspace = true
chrono.workspace = true
ed25519-dalek.workspace = true
# Used by the balloon reclaim controller as a cross-platform memory-
# pressure source. PSI on Linux and `vm_pressure` on macOS are
# stronger signals — wiring those in is a follow-up.
sysinfo = { version = "0.30", default-features = false }
# Plan 60 Phase 3 Slice B — L4 egress policy CIDR matching.
ipnet.workspace = true
# Plan 60 Phase 3 Slice B — pure-Rust DNS resolver, alternative to
# the host libc's `getaddrinfo`. Opt-in; `TokioDnsResolver` stays the
# default until consumers explicitly switch.
hickory-resolver = { workspace = true, features = ["tokio-runtime"] }
# `rand` in main deps (not dev-only): the TTL reaper (G6 of the parity
# plan, "TTL reaper precision as side channel") applies ±10 s jitter
# to its tick interval via a `Rng` so observers can't use TTL expiry
# as a precise timing oracle.
rand.workspace = true
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
thiserror = "1"
# Plan 60 Phase 7 — `web_fetch` tool parses RFC-3986 URLs to enforce
# scheme/host invariants before the allowlist check.
url = "2"
# Wave 2.6: L7EgressProxy uses tokio::net::lookup_host for the
# production DnsResolver impl. Tests use only `macros + rt`, the
# proxy needs `net` for lookup. `rt-multi-thread` lands when the
# TCP listener loop ships in 2.6 chunk (c).
tokio = { workspace = true, features = ["net", "rt"] }
tracing.workspace = true

# Sampler (A3) reads `/proc/<pid>/stat` and uses `sysconf(_SC_CLK_TCK)` /
# `_SC_PAGESIZE` to convert jiffies → microseconds and pages → bytes.
# Linux-only; the non-Linux source readers compile to empty stubs that
# don't reference libc, so the dep is gated.
[target.'cfg(target_os = "linux")'.dependencies]
libc.workspace = true

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread", "net", "io-util", "time"] }

[lints]
workspace = true
