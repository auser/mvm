[package]
name = "mvm-secrets-dispatcher"
version.workspace = true
edition.workspace = true
description = "Secrets dispatcher subprocess — hosts host.secrets.v1 only (Plan 104 W1b.1; Plan 104 §H-L1 + ADR-049)"
license.workspace = true
repository.workspace = true
homepage.workspace = true
authors.workspace = true

# One of the four per-VM subprocesses (mvm-broker, mvm-secrets-dispatcher,
# mvm-host-signer, mvm-audit-signer — see ADR-061 §"Decision"). Runs at
# uid 902 with seccomp + setpriv + per-workload cgroup + namespace
# isolation; the supervisor side wires those (lands in W1b.2). The
# subprocess shape mirrors mvm-broker because the wire protocol is the
# same `ServiceCall` envelope — the only difference is this one hosts
# `host.secrets.v1` exclusively while mvm-broker hosts the generic
# `host.time.v1` / `host.cost.v1` / `broker.v1` handlers.
#
# W1b.1 ships the scaffold + handler-stub registration → every call
# returns `Err(NotBound)` until W5 wires `HostSecretsV1Handler` per
# ADR-049 §"Substitution flow".

[lib]
name = "mvm_secrets_dispatcher"
path = "src/lib.rs"

[[bin]]
name = "mvm-secrets-dispatcher"
path = "src/bin/mvm-secrets-dispatcher.rs"

[dependencies]
anyhow.workspace = true
mvm-core.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror = "1"
tokio = { workspace = true, features = ["io-util", "macros", "net", "rt-multi-thread", "sync"] }
tracing.workspace = true
tracing-subscriber.workspace = true

[dev-dependencies]
tempfile.workspace = true
tokio = { workspace = true, features = ["test-util"] }

[lints]
workspace = true
