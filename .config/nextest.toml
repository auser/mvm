# Default nextest profile + targeted serialization for the OCI
# byte-determinism tests.
#
# `materialize_is_byte_deterministic_for_the_same_input` and
# `seal_is_byte_deterministic_for_identical_rootfs_bytes` make a
# strong claim: two *independent* staging directories with identical
# contents produce byte-identical `mke2fs -d` output. In practice
# the claim holds when readdir() order of the source dir is stable
# across calls. Under cargo test (threads in one process) it has
# been stable for weeks. Under `cargo nextest run` (one process per
# test, ncpus in parallel) the simultaneous tempdir creation across
# parallel test processes can shift `/tmp`'s hash bucket layout
# between the two `build_one()` calls, in turn shifting the
# staging-dir readdir() order, in turn producing a different
# inode-allocation order inside mke2fs, in turn producing different
# bytes.
#
# The `byte-determinism` test-group caps these two tests to a
# single concurrent runner so /tmp churn during their execution
# drops to whatever the test itself produces. The rest of the
# workspace continues at default parallelism.
[test-groups]
byte-determinism = { max-threads = 1 }

[[profile.default.overrides]]
filter = "test(=materialize_is_byte_deterministic_for_the_same_input) + test(=seal_is_byte_deterministic_for_identical_rootfs_bytes)"
test-group = "byte-determinism"
