name: Deploy GitHub Pages

# Deploy is operator-triggered. The previous `push: branches: [main]
# paths: [public/**]` trigger was dropped in the ecosystem-wide CI
# cost reduction (no push-to-branch triggers anywhere). After merging
# a docs change, dispatch this workflow from the Actions tab to
# publish.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: public
        run: npm ci

      - name: Build Astro site
        working-directory: public
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
