name: CI

on:
  push:
    branches: [main, feat/*]
  pull_request:
    branches: [main]

# Cancel a previous run when a new commit lands on the same branch.
# Without this, the PR check panel accumulates stale failed runs from
# superseded SHAs (we hit this on PRs #17 and #18). `main` runs are
# never cancelled because the group is keyed on workflow + ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-check-

      - name: Check
        run: cargo check --all-targets

  fmt:
    name: Format
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-e2e-

      - name: Run E2E tests
        run: cargo test --test e2e

  # The following four ADR-002 enforcement jobs were originally defined
  # here but are now consolidated into .github/workflows/security.yml
  # (W6.3). Removed to dedup the per-PR CI surface — the security.yml
  # versions remain the canonical merge gate AND extend coverage via a
  # nightly cron, which the ci.yml copies couldn't:
  #   - Security Audit (cargo-audit)            → security.yml::cargo-audit (§W5.2)
  #   - Supply chain (cargo-deny)               → security.yml::cargo-deny (§W5.2)
  #   - Reproducibility (§W5.3)                  → security.yml::reproducibility
  #   - Prod guest agent has no dev-shell …      → security.yml::prod-agent-no-exec (§W4.3)
  # Every dropped job's enforcement contract is preserved verbatim in
  # security.yml; this is purely a CI-surface dedup, not a security
  # regression.

  mcp-server-smoke:
    name: MCP server stdio roundtrip (plan 32 / Proposal A)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install jq (for JSON-RPC response parsing)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mcp-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mcp-smoke-

      - name: Build mvmctl + run MCP roundtrip smoke
        run: ./scripts/test-mcp-roundtrip.sh

  # ── Lane: Nix flake check (Linux eval) ────────────────────────────
  # Catches eval-time bugs that only surface on Linux. The host-side
  # `nix flake check` was only ever exercised on the macOS runner;
  # Linux-only output paths (`packages.<sys>.{mvm-guest-agent,
  # mvm-guest-agent-dev}`, `devShells.<sys>.builder`) never got
  # evaluated in CI before. The `flake-utils.lib.eachSystem`
  # inversion-semantics bug we almost shipped during W7 would have
  # been caught here.
  nix-flake-check:
    name: Nix flake check (Linux eval)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Eval-check every flake
        run: |
          set -euo pipefail
          for d in ./nix \
                   ./nix/dev \
                   ./nix/images/builder \
                   ./nix/images/default-tenant \
                   ./nix/images/examples/hello \
                   ./nix/images/examples/hello-node \
                   ./nix/images/examples/hello-python \
                   ./nix/images/examples/llm-agent; do
            echo "=== $d ==="
            nix flake check --no-build "$d"
          done
