name: CI

on:
  # Keep ordinary pushes cheap and predictable. This workflow is the
  # day-to-day signal and is intentionally capped at four jobs:
  # lint, test, MCP smoke, and Nix eval. Expensive platform, live-VM,
  # OCI ratification, security, Windows, and release artifact jobs live
  # in release/manual workflows.
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint (fmt + clippy + policy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Install system build deps
        run: sudo apt-get update && sudo apt-get install -y libcap-ng-dev lld

      - uses: ./.github/actions/install-zigbuild

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: ADR coverage (informational)
        continue-on-error: true
        run: cargo run -p xtask -- check-adr-coverage

      - name: No Debug/Display on secret-named types
        run: cargo run -p xtask -- check-no-display-on-secret-types

      - name: No positional audit::emit / event-chain calls
        run: cargo run -p xtask -- check-audit-positional

      - name: No forbidden dependency families
        run: cargo run -p xtask -- check-forbidden-deps

      - name: Gated doc claims
        run: cargo run -p xtask -- check-doc-claims

      - name: No overclaiming
        run: cargo run -p xtask -- check-no-overclaim

      - name: Unique spec numbers
        run: cargo run -p xtask -- check-spec-numbers

      - name: host-binaries manifest parity
        run: cargo run -p xtask -- check-mvm-host-binaries-sync

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install system build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libcap-ng-dev lld

      - uses: ./.github/actions/install-zigbuild

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo nextest run --workspace --all-targets

      - name: Assert auto-detect on Linux picks libkrun
        run: |
          cargo test -p mvm-build --features builder-vm --lib \
            builder_backend_select::tests::auto_detect_default_for_everything_else_picks_libkrun

  mcp-server-smoke:
    name: MCP server stdio roundtrip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: ./.github/actions/install-zigbuild

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mcp-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-mcp-smoke-

      - name: Build mvmctl + run MCP roundtrip smoke
        run: ./scripts/test-mcp-roundtrip.sh

  nix-flake-check:
    name: Nix flake check (Linux eval)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Eval-check every flake
        run: |
          set -euo pipefail
          find nix -name flake.nix -type f -print0 | sort -z | while IFS= read -r -d '' flake; do
            d="$(dirname "$flake")"
            echo "=== $d ==="
            nix flake check --no-build "./$d"
          done
