name: Architecture invariants

# Architectural invariants enforced at CI time. Each lane corresponds to
# a numbered invariant in the cross-repo plan
# `~/.claude/plans/what-do-we-need-deep-dolphin.md` "Architectural
# invariants" section. Failure on any lane blocks merge.
#
# Why a separate workflow from ci.yml: invariants are slow-moving and
# high-signal — a violation is almost always a real architectural drift,
# not a flaky test. Keeping them isolated makes the green/red signal
# obvious in PR review and lets us add lanes without touching the
# day-to-day CI surface.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Invariant #1: Only mvmd runs orchestration servers ──────────────
  # mvm is a library + CLI substrate. No NEW orchestration / control-
  # plane server in any mvm crate. Five categories of *substrate*
  # server exist in mvm today and are explicitly allowlisted below —
  # adding to the allowlist requires a new category, not a new server
  # in an existing category.
  #
  # Substrate categories (allowlisted):
  #   1. Privilege boundary — mvm-hostd (`crates/mvm/src/hostd/`).
  #      Runs as root; mvmd-agent talks to it over UDS so the
  #      orchestrator doesn't need privilege. Collapsing into mvmd
  #      would destroy the privilege boundary it exists to provide.
  #   2. Per-VM security primitives — L7 egress proxy
  #      (`crates/mvm-supervisor/src/l7_proxy.rs`) and builder-VM
  #      install-time egress allowlist proxy
  #      (`crates/mvm-egress-proxy/`). The L7 proxy inspects outbound
  #      HTTP from each running guest; the install proxy enforces
  #      ADR-047's registry allowlist inside the builder VM during
  #      `uv pip install` / `pnpm install` (Plan 73 Followup B.2.x).
  #      Both live next to the workload, not at the orchestrator
  #      tier — moving either to mvmd would force every per-VM flow
  #      through the control plane.
  #   3. Per-VM provider plumbing — Apple Container sockets
  #      (`crates/mvm-providers/src/apple_container/macos.rs`).
  #      Provider-specific guest-channel transport.
  #   4. Observability — Prometheus metrics endpoint
  #      (`crates/mvm-cli/src/metrics_server.rs`) plus per-VM gateway
  #      audit sockets in `crates/mvm-supervisor/src/gateway_bridge.rs`
  #      and `crates/mvm-supervisor/src/gateway_audit.rs`. These are
  #      VM-local telemetry substrate: a Rust ingest socket receives
  #      NDJSON flow events from the Swift Vz bridge, and a sibling
  #      UDS fan-out socket exposes the same signed-audit stream to
  #      local subscribers (`nc -U`). They do not accept control-plane
  #      commands or host multi-tenant orchestration state.
  #   5. Ephemeral port discovery — `TcpListener::bind("127.0.0.1:0")`
  #      in `crates/mvm-cli/src/template_cmd.rs`. Binds to find a free
  #      port; drops the listener immediately. Not a daemon.
  #   6. Test-only mock guest-agent
  #      (`crates/mvm-backend/src/mock_guest_agent.rs`). Mirrors the
  #      in-guest vsock agent on the host side via Unix-domain socket
  #      so `mvmctl fs *` / `proc *` are hermetically testable against
  #      `MockBackend`. Tier-3 / test-only; never selected by
  #      `AnyBackend::auto_select`. Production callers can't reach it.
  #   7. In-guest local addon plumbing
  #      (`crates/mvm-addon-vsock-bridge/`). Binds loopback-only TCP
  #      listeners inside the guest and forwards to the local host
  #      addon proxy over vsock. This is per-VM developer substrate;
  #      distributed service discovery, tenant policy, and
  #      cryptographic routing remain mvmd-owned.
  #   8. Per-workload broker subprocess substrate. Crates that belong
  #      to this category declare
  #      `[package.metadata.mvm.architecture].substrate_server_category`
  #      in their `Cargo.toml`. Today that includes `mvm-broker`,
  #      `mvm-host-signer`, and `mvm-audit-signer` (ADR-062 dropped
  #      `mvm-secrets-dispatcher`). These UDS listeners are VM-local
  #      broker/signer helpers spawned by the supervisor for a single
  #      workload, not multi-tenant control-plane servers.
  #
  # The in-guest vsock agent in `mvm-guest` is also excluded — it
  # runs *inside* the microVM, not on the host.
  #
  # Plan reference: `~/.claude/plans/what-do-we-need-deep-dolphin.md`
  # architectural invariant #1.
  no-orchestration-server-in-mvm:
    name: Invariant #1 — no orchestration server in mvm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Grep mvm crates for server-binding patterns outside substrate allowlist
        run: |
          set -e

          # Server-binding patterns. Each is a strong signal that a
          # crate is acting as a server, not a client:
          #   axum::Router / axum::serve / axum::Server — axum entry points
          #   hyper::Server / hyper::server::conn — hyper 0.x and 1.x
          #     (NOT hyper::Client / hyper::Body — those are fine; used
          #     by reqwest etc.)
          #   tonic::transport::Server — gRPC server
          #   TcpListener::bind / UnixListener::bind — direct listening
          #   NamedPipeServer — Windows named pipes server
          PATTERNS='\b(axum::Router|axum::serve|axum::Server|hyper::Server|hyper::server::conn|tonic::transport::Server|TcpListener::bind|UnixListener::bind|NamedPipeServer)\b'

          # Strip `#[cfg(test)]`-gated `mod` blocks from a Rust source
          # before grepping. Inline test fixtures that bind a
          # `UnixListener` / `TcpListener` for round-trip tests
          # (e.g. mvm-backend's `vz_control.rs` fake supervisor) are
          # a legitimate Rust idiom and don't count as production
          # servers. The filter is conservative: it only elides whole
          # `#[cfg(test)] mod NAME { ... }` blocks by tracking brace
          # depth, leaving single-line `#[cfg(test)]` items and
          # production code untouched.
          strip_cfg_test_mods() {
            awk '
              BEGIN { skip = 0; depth = 0; pending = 0 }
              skip == 1 {
                n = gsub(/\{/, "&"); depth += n
                n = gsub(/\}/, "&"); depth -= n
                if (depth <= 0) { skip = 0; depth = 0 }
                next
              }
              pending == 1 {
                if ($0 ~ /^[[:space:]]*(pub[[:space:]]+)?mod[[:space:]][^{]*\{/) {
                  n = gsub(/\{/, "&"); depth += n
                  n = gsub(/\}/, "&"); depth -= n
                  if (depth > 0) { skip = 1 } else { depth = 0 }
                  pending = 0
                  next
                }
                pending = 0
              }
              /^[[:space:]]*#\[cfg\(test\)\][[:space:]]*$/ { pending = 1; next }
              { print }
            ' "$1"
          }

          metadata_allows_server_patterns() {
            local file="$1"
            local crate_dir cargo_toml
            crate_dir=$(dirname "$file")
            while [ "$crate_dir" != "." ] && [ "$crate_dir" != "/" ]; do
              cargo_toml="$crate_dir/Cargo.toml"
              if [ -f "$cargo_toml" ]; then
                if rg -n '^[[:space:]]*substrate_server_category[[:space:]]*=' "$cargo_toml" >/dev/null; then
                  return 0
                fi
                return 1
              fi
              crate_dir=$(dirname "$crate_dir")
            done
            return 1
          }

          # Substrate allowlist — categories documented in this
          # workflow's header. File-level exceptions are limited to the
          # long-standing non-crate cases; crate-owned server
          # exceptions must be declared structurally via Cargo metadata.
          CANDIDATES=$(rg \
              --type rust \
              --files-with-matches \
              --glob '!**/target/**' \
              --glob '!crates/mvm-guest/**' \
              --glob '!xtask/**' \
              --glob '!**/tests/**' \
              --glob '!**/benches/**' \
              --glob '!**/examples/**' \
              --glob '!crates/mvm/src/hostd/**' \
              --glob '!crates/mvm-supervisor/src/l7_proxy.rs' \
              --glob '!crates/mvm-egress-proxy/**' \
              --glob '!crates/mvm-providers/src/apple_container/**' \
              --glob '!crates/mvm-cli/src/metrics_server.rs' \
              --glob '!crates/mvm-supervisor/src/gateway_bridge.rs' \
              --glob '!crates/mvm-supervisor/src/gateway_audit.rs' \
              --glob '!crates/mvm-cli/src/template_cmd.rs' \
              --glob '!crates/mvm-backend/src/mock_guest_agent.rs' \
              --glob '!crates/mvm-addon-vsock-bridge/**' \
              --glob '!crates/mvm-broker/src/bin/mvm-broker.rs' \
              -e "$PATTERNS" \
              crates/ src/ \
              || true)

          MATCHES=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if metadata_allows_server_patterns "$f"; then
              continue
            fi
            hits=$(strip_cfg_test_mods "$f" | grep -nE "$PATTERNS" || true)
            if [ -n "$hits" ]; then
              while IFS= read -r hit; do
                MATCHES="${MATCHES}${f}:${hit}"$'\n'
              done <<< "$hits"
            fi
          done <<< "$CANDIDATES"

          if [ -n "$MATCHES" ]; then
            echo "::error::Architectural invariant #1 violated: a new server appeared in mvm outside the substrate allowlist."
            echo ""
            echo "$MATCHES"
            echo ""
            echo "mvm is a library + CLI substrate. Orchestration servers belong in mvmd."
            echo ""
            echo "If your addition is a new category of substrate (privilege boundary,"
            echo "per-VM security, per-VM provider plumbing, observability, or ephemeral"
            echo "port discovery), document it at the top of"
            echo ".github/workflows/architecture.yml and, for crate-owned listeners,"
            echo "mark the crate with package.metadata.mvm.architecture.substrate_server_category"
            echo "in the same PR. The bar is 'a new category emerged' — not 'I want to"
            echo "add a new server here'."
            echo ""
            echo "If your addition belongs in mvmd, move it to mvmd."
            exit 1
          fi

          echo "No orchestration servers in mvm — invariant #1 holds."
