# mvm template configuration for OpenClaw.
#
# Each variant defines a microVM build target with its own role, resource
# allocation, and optional persistent data disk. The same NixOS image is
# shared across all tenants — per-tenant config is injected at runtime
# via mvm's config and secrets drives.

template_id = "openclaw"
flake_ref   = "."

[[variants]]
name = "openclaw-gateway"
role = "gateway"
profile = "gateway"
vcpus = 2
mem_mib = 1024
data_disk_mib = 0

[[variants]]
name = "openclaw-worker"
role = "worker"
profile = "worker"
vcpus = 2
mem_mib = 2048
data_disk_mib = 2048
